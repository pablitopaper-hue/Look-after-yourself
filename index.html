<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>App Nutricional PRO</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
    url('https://images.unsplash.com/photo-1546069901-ba9599a7e63c') no-repeat center center fixed;
    background-size: cover;
}

.container {
    background: rgba(255,255,255,0.95);
    max-width: 420px;
    margin: 30px auto;
    padding: 20px;
    border-radius: 15px;
}

input, button {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
}

.card {
    background: #f8f8f8;
    margin-top: 10px;
    padding: 10px;
    border-radius: 10px;
    cursor: pointer;
}

.result {
    margin-top: 15px;
    padding: 10px;
    border-radius: 10px;
    color: white;
}

.rojo { background:#e74c3c; }
.naranja { background:#e67e22; }
.amarillo { background:#f1c40f; color:black; }
.verde { background:#2ecc71; }

</style>
</head>

<body>

<div class="container">

<h2>Analizador PRO</h2>

<input id="busqueda" placeholder="Ej: yogur natural">
<button onclick="buscar()">Buscar</button>

<div id="lista"></div>
<div id="resultado"></div>

</div>

<script>

let productos = [];

// Buscar productos
async function buscar() {

    let query = document.getElementById("busqueda").value;

    let url = `https://world.openfoodfacts.org/cgi/search.pl?search_terms=${query}&search_simple=1&json=1&page_size=5`;

    let res = await fetch(url);
    let data = await res.json();

    productos = data.products;

    let lista = document.getElementById("lista");
    lista.innerHTML = "";

    productos.forEach((p, i) => {
        lista.innerHTML += `
            <div class="card" onclick="seleccionar(${i})">
                <strong>${p.product_name || "Sin nombre"}</strong><br>
                ${p.brands || ""}
            </div>
        `;
    });
}

// Seleccionar producto
function seleccionar(i) {

    let p = productos[i];
    let n = p.nutriments || {};

    let datos = {
        azucar: n.sugars_100g || 0,
        grasas: n["saturated-fat_100g"] || 0,
        sal: n.salt_100g || 0,
        calorias: n.energy_100g || 0
    };

    let nutriscore = p.nutriscore_grade;

    let evaluacion = evaluar(datos, nutriscore);

    document.getElementById("resultado").innerHTML = `
        <div class="result ${evaluacion.color}">
            <h3>${p.product_name}</h3>
            NutriScore: ${nutriscore || "N/A"}<br>
            Azúcar: ${datos.azucar}g<br>
            Grasas sat: ${datos.grasas}g<br>
            Sal: ${datos.sal}g<br>
            Calorías: ${datos.calorias} kcal<br><br>
            <strong>${evaluacion.texto}</strong>
        </div>
    `;
}

// Evaluación inteligente
function evaluar(d, nutri) {

    // Prioridad a NutriScore
    if (nutri === "a") return {color:"verde", texto:"Excelente"};
    if (nutri === "b") return {color:"amarillo", texto:"Bueno"};
    if (nutri === "c") return {color:"naranja", texto:"Mediocre"};
    if (nutri === "d" || nutri === "e") return {color:"rojo", texto:"Malo"};

    // Fallback manual
    let score = 0;

    if (d.azucar > 10) score += 2;
    if (d.grasas > 5) score += 2;
    if (d.sal > 1.5) score += 2;

    if (score >= 5) return {color:"rojo", texto:"Malo"};
    if (score >= 3) return {color:"naranja", texto:"Mediocre"};
    if (score >= 1) return {color:"amarillo", texto:"Limitado"};
    return {color:"verde", texto:"Excelente"};
}

</script>

</body>
</html>
