<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Analizador de Alimentos</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background-image: url('https://images.unsplash.com/photo-1490818387583-1baba5e638af');
    background-size: cover;
}

.container {
    background: rgba(255,255,255,0.9);
    padding: 30px;
    margin: 50px auto;
    width: 90%;
    max-width: 500px;
    border-radius: 15px;
}

.resultado {
    margin-top: 20px;
    padding: 15px;
    border-radius: 10px;
    font-weight: bold;
}

.rojo { background: #ff4d4d; color:white;}
.naranja { background: orange; color:white;}
.amarillo { background: #ffd54f;}
.verde { background: #4caf50; color:white;}
</style>
</head>

<body>

<div class="container">
    <h2>🥦 Analizador de Alimentos</h2>

    <input type="text" id="alimento" placeholder="Ej: Coca Cola, Yogur...">
    <br><br>
    <button onclick="analizar()">Analizar</button>

    <div id="resultado" class="resultado"></div>
</div>

<script>
async function analizar() {

    let nombre = document.getElementById("alimento").value;
    let resultadoDiv = document.getElementById("resultado");

    if (!nombre) {
        resultadoDiv.innerHTML = "Introduce un alimento";
        return;
    }

    try {
        let url = `https://world.openfoodfacts.org/cgi/search.pl?search_terms=${nombre}&search_simple=1&action=process&json=1`;

        let response = await fetch(url);
        let data = await response.json();

        if (data.products.length === 0) {
            resultadoDiv.innerHTML = "No encontrado";
            return;
        }

        let producto = data.products[0];

        let nutriscore = producto.nutriscore_grade;

        let texto = "";
        let clase = "";

        // Convertimos NutriScore a tu sistema
        switch(nutriscore) {
            case "e":
                texto = "🔴 Producto de riesgo: Malo";
                clase = "rojo";
                break;
            case "d":
                texto = "🟠 Producto mediocre";
                clase = "naranja";
                break;
            case "c":
                texto = "🟡 Producto limitado: Bueno";
                clase = "amarillo";
                break;
            case "a":
            case "b":
                texto = "🟢 Sin riesgo: Excelente";
                clase = "verde";
                break;
            default:
                texto = "Sin datos suficientes";
        }

        resultadoDiv.className = "resultado " + clase;
        resultadoDiv.innerHTML = `
            <strong>${producto.product_name || "Producto"}</strong><br>
            NutriScore: ${nutriscore?.toUpperCase() || "N/A"}<br><br>
            ${texto}
        `;

    } catch (error) {
        resultadoDiv.innerHTML = "Error al conectar con la base de datos";
    }
}
</script>

</body>
</html>
